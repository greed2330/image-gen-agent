# Model presets — base values from checkpoint model cards.
# Tune after actual VRAM measurement in Phase 1.
# Ref: docs/설계문서/07 §3-1

illustrious_base:
  steps: 28
  cfg: 5.0
  sampler: euler_ancestral
  scheduler: normal
  clip_skip: 2
  identity_emphasis: 1.3
  img2img_denoise: 0.55
  resolutions:
    portrait: [832, 1216]
    landscape: [1216, 832]
    square: [1024, 1024]
  quality_pos:
    - masterpiece
    - best quality
    - amazing quality
  quality_neg:
    - worst quality
    - low quality
    - jpeg artifacts
    - blurry
    - ugly
    - bad anatomy
  allowed_nudge:
    cfg: [-1.0, 1.0]
    steps: [-8, 12]
  hard_clamp:
    cfg: [3.0, 9.0]
    steps: [12, 50]

noobai_base:
  steps: 28
  cfg: 5.5
  sampler: euler_ancestral
  scheduler: karras
  clip_skip: 2
  identity_emphasis: 1.3
  img2img_denoise: 0.55
  resolutions:
    portrait: [832, 1216]
    landscape: [1216, 832]
    square: [1024, 1024]
  quality_pos:
    - masterpiece
    - best quality
    - newest
  quality_neg:
    - worst quality
    - low quality
    - old
    - bad hands
  allowed_nudge:
    cfg: [-1.0, 1.5]
    steps: [-8, 12]
  hard_clamp:
    cfg: [3.0, 9.0]
    steps: [12, 50]

chroma_base:
  steps: 20
  cfg: 3.5
  sampler: euler
  scheduler: simple
  resolutions:
    portrait: [832, 1216]
    landscape: [1216, 832]
    square: [1024, 1024]
  quality_pos: []
  quality_neg: []
  allowed_nudge:
    cfg: [-1.0, 1.0]
    steps: [-5, 10]
  hard_clamp:
    cfg: [1.5, 7.0]
    steps: [10, 50]
